<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Student POST Test</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 2rem; }
      pre { background:#f6f6f6; padding:1rem; }
    </style>
  </head>
  <body>
    <h1>POST /student test</h1>
    <p>Sending student data and showing echoed response below.</p>
    <div id="status">Sending...</div>
    <pre id="result"></pre>

    <script>
      const student = {
        Name: "Mahima Manvi",
        Uid: "24BCS12663",
        Section: "716B"
      };

      async function send() {
        try {
          const res = await fetch('/student', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(student)
          });
          const data = await res.json();
          document.getElementById('status').textContent = 'Response received (status ' + res.status + ')';
          document.getElementById('result').textContent = JSON.stringify(data, null, 2);
        } catch (err) {
          document.getElementById('status').textContent = 'Error: ' + err;
        }
      }

      // send on load
      send();
    </script>
  </body>
</html>
