<!DOCTYPE html>
<html>
<head>
  <title>Select All Checkbox</title>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      width: 380px;
      background: rgba(255, 255, 255, 0.95);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      transition: transform 0.3s ease;
    }

    .box:hover {
      transform: translateY(-5px);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
      letter-spacing: 1px;
    }

    label {
      font-size: 17px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 12px 0;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    label:hover {
      color: #5a4fcf;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #5a4fcf;
      cursor: pointer;
    }

    hr {
      border: none;
      height: 2px;
      background: linear-gradient(to right, #667eea, #764ba2);
      margin: 18px 0;
      border-radius: 5px;
    }
  </style>

</head>

<body>

  <div class="box">

    <h2>Select Items</h2>

    <!-- Master checkbox -->
    <label>
      <input type="checkbox" id="selectAll">
      <strong>Select All</strong>
    </label>

    <hr>

    <!-- 5 item checkboxes -->
    <label><input type="checkbox" class="item"> Drink Water</label>
    <label><input type="checkbox" class="item"> Complete Assignments</label>
    <label><input type="checkbox" class="item"> Read a Book</label>
    <label><input type="checkbox" class="item"> Exercise</label>
    <label><input type="checkbox" class="item"> Practice Coding</label>

  </div>

  <script>
    const selectAll = document.getElementById("selectAll");
    const items = document.querySelectorAll(".item");

    selectAll.addEventListener("change", function () {

      // loop to check/uncheck all items
      for (let i = 0; i < items.length; i++) {
        items[i].checked = selectAll.checked;
      }

    });
  </script>

</body>
</html>
